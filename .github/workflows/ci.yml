name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  packages: write

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  LOCAL_IMAGE_NAME: local/orchestrator:ci

jobs:
  # ── 1. Secret scan ─────────────────────────────────────────────────────────
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Qualité Python + sécurité statique ──────────────────────────────────
  python-quality:
    name: Python quality & SAST
    runs-on: ubuntu-latest
    needs: gitleaks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy types-PyYAML bandit pip-audit

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format check)
        run: ruff format --check .

      - name: Mypy (type check)
        run: mypy orchestrator api --ignore-missing-imports

      - name: Bandit (SAST — sécurité statique Python)
        # -ll = sévérité medium+, -q = quiet, -r = récursif
        # Bloque le pipeline si des problèmes de sécurité sont détectés
        run: bandit -r orchestrator api -ll -q

      - name: pip-audit (CVE dépendances Python)
        # Échoue si des vulnérabilités connues avec fix disponible sont trouvées
        run: pip-audit -r requirements.txt --fix-only-if-possible --skip-editable

      - name: Pytest (tests unitaires + sécurité)
        env:
          AUTH_ENABLED: "true"
          API_TOKEN_ADMIN: "ci-test-admin-token-xyz"
          API_TOKEN_OPERATOR: "ci-test-operator-token-xyz"
          API_TOKEN_READER: "ci-test-reader-token-xyz"
          ANTHROPIC_API_KEY: "sk-ant-ci-test"
          OPENAI_API_KEY: "sk-ci-test"
        run: pytest -q --tb=short

  # ── 3. SBOM (Software Bill of Materials) ───────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: python-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Python SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment --of json -o sbom-python.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-python
          path: sbom-python.cyclonedx.json
          retention-days: 90

  # ── 4. Build Docker ────────────────────────────────────────────────────────
  docker-build:
    name: Docker buildx
    runs-on: ubuntu-latest
    needs: python-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha

      - name: Build image locally for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.LOCAL_IMAGE_NAME }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image as artifact
        run: docker save ${{ env.LOCAL_IMAGE_NAME }} | gzip > /tmp/docker-image.tar.gz

      - name: Upload image artifact for scanning jobs
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/docker-image.tar.gz
          retention-days: 1

      - name: Push image to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  # ── 5. Trivy CVE scan ──────────────────────────────────────────────────────
  trivy-image:
    name: Trivy image scan
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < docker-image.tar.gz

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run Trivy (SARIF — upload GitHub Security tab)
        run: |
          trivy image \
            --format sarif \
            --output trivy-image-results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --vuln-type os,library \
            --scanners vuln \
            ${{ env.LOCAL_IMAGE_NAME }}

      - name: Run Trivy (security gate — bloque si CRITICAL trouvé)
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --vuln-type os,library \
            --scanners vuln \
            ${{ env.LOCAL_IMAGE_NAME }}

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif

      - name: Generate image SBOM with Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          syft ${{ env.LOCAL_IMAGE_NAME }} -o cyclonedx-json > sbom-image.cyclonedx.json

      - name: Upload image SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-image
          path: sbom-image.cyclonedx.json
          retention-days: 90

  # ── 6. Grype CVE scan ──────────────────────────────────────────────────────
  grype-image:
    name: Grype image scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < docker-image.tar.gz

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run Grype (security gate — bloque si HIGH+ avec fix disponible)
        # --only-fixed : exclut les CVE sans correctif upstream
        run: grype ${{ env.LOCAL_IMAGE_NAME }} --fail-on high -o table --only-fixed
