name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  packages: write

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  LOCAL_IMAGE_NAME: local/orchestrator:ci

jobs:
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python-quality:
    name: Python quality
    runs-on: ubuntu-latest
    needs: gitleaks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest ruff mypy fastapi uvicorn types-PyYAML

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: |
          if [ -d orchestrator ] || [ -d api ]; then
            mypy orchestrator api
          else
            echo "No application package found, skipping mypy."
          fi

      - name: Pytest
        run: |
          if [ -d tests ]; then
            pytest -q
          else
            echo "No tests directory found, skipping pytest."
          fi

  docker-build:
    name: Docker buildx
    runs-on: ubuntu-latest
    needs: python-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha

      - name: Build image locally for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ${{ env.LOCAL_IMAGE_NAME }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push image to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  trivy-image:
    name: Trivy image scan
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Run Trivy on built image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.LOCAL_IMAGE_NAME }}
          format: sarif
          output: trivy-image-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln
          cache: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-results.sarif

  grype-image:
    name: Grype image scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Install Grype
        uses: anchore/scan-action/download-grype@v6

      - name: Run Grype on built image
        run: |
          grype ${{ env.LOCAL_IMAGE_NAME }} --fail-on high -o table
