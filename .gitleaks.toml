title = "ai-orchestrator gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Project-specific allowlist for non-secret example files and local tooling"
paths = [
  '''^\.env\.example$''',
  '''^docs/.*$''',
  '''^\.github/workflows/.*$''',
  '''^tests/fixtures/.*$''',
  '''^tests/data/.*$''',
  '''^README\.md$''',
  '''^CLAUDE\.md$''',
]

regexes = [
  '''(?i)example[_-]?key''',
  '''(?i)dummy[_-]?token''',
  '''(?i)test[_-]?secret''',
  '''(?i)fake[_-]?api[_-]?key''',
]

stopwords = [
  '''example''',
  '''dummy''',
  '''sample''',
  '''test''',
  '''fake''',
  '''changeme''',
]
